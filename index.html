<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Current Age Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0b0b;
      --text: #f5f5f5;
      --muted: #8f8f8f;
      --font-stack: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-stack);
    }

    .timer-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      width: max-content;
      max-width: 100%;
      font-variant-numeric: tabular-nums;
    }

    .label {
      margin: 0;
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.4;
      color: var(--text);
      font-weight: 500;
    }

    .timer-text {
      margin: 0;
      font-size: clamp(1.1rem, 2.8vw, 2rem);
      line-height: 1.35;
      letter-spacing: -0.02em;
      white-space: nowrap;
      word-break: break-word;
    }

    .value {
      font-weight: 700;
      color: var(--text);
    }

    .unit {
      font-size: 0.82em;
      color: var(--muted);
      font-weight: 500;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }
    }
  
    .wrap {
      width: max-content;
      max-width: none;
    }
</style>
</head>
<body>
  <main>
    <section class="timer-block" aria-labelledby="timer-label">
      <p id="timer-label" class="label">Current age:</p>
      <p id="timer" class="timer-text" aria-hidden="true">
        <span class="value" data-part="years">00</span> <span class="unit">years</span>
        <span class="value" data-part="months">00</span> <span class="unit">months</span>
        <span class="value" data-part="days">00</span> <span class="unit">days</span>
        <span class="value" data-part="hours">00</span> <span class="unit">hours</span>
        <span class="value" data-part="minutes">00</span> <span class="unit">minutes</span>
        <span class="value" data-part="seconds">00</span> <span class="unit">seconds</span>
        <span class="value" data-part="milliseconds">000</span> <span class="unit">milliseconds</span>
      </p>
      <p id="timer-live" class="sr-only" aria-live="polite" aria-atomic="true">
        Current age timer loading.
      </p>
      <noscript>
        <p class="label">Enable JavaScript to view the live timer.</p>
      </noscript>
    </section>
  </main>

  <script>
    const START_DATE = new Date("2007-07-24T00:00:00+08:00");
    const MS_PER_SECOND = 1000;
    const MS_PER_MINUTE = 60 * MS_PER_SECOND;
    const MS_PER_HOUR = 60 * MS_PER_MINUTE;
    const MS_PER_DAY = 24 * MS_PER_HOUR;

    const liveRegion = document.getElementById("timer-live");
    const partNodes = {
      years: document.querySelector('[data-part="years"]'),
      months: document.querySelector('[data-part="months"]'),
      days: document.querySelector('[data-part="days"]'),
      hours: document.querySelector('[data-part="hours"]'),
      minutes: document.querySelector('[data-part="minutes"]'),
      seconds: document.querySelector('[data-part="seconds"]'),
      milliseconds: document.querySelector('[data-part="milliseconds"]')
    };

    let previousAnnouncementKey = "";

    function pad(value, length) {
      return String(value).padStart(length, "0");
    }

    function daysInMonth(year, monthIndex) {
      return new Date(year, monthIndex + 1, 0).getDate();
    }

    function addMonths(baseDate, monthOffset) {
      const monthProbe = new Date(baseDate.getFullYear(), baseDate.getMonth() + monthOffset, 1);
      const targetYear = monthProbe.getFullYear();
      const targetMonth = monthProbe.getMonth();
      const targetDay = Math.min(baseDate.getDate(), daysInMonth(targetYear, targetMonth));

      return new Date(
        targetYear,
        targetMonth,
        targetDay,
        baseDate.getHours(),
        baseDate.getMinutes(),
        baseDate.getSeconds(),
        baseDate.getMilliseconds()
      );
    }

    function addYears(baseDate, yearOffset) {
      return addMonths(baseDate, yearOffset * 12);
    }

    function getElapsedParts(fromDate, toDate) {
      if (toDate < fromDate) {
        return {
          years: 0,
          months: 0,
          days: 0,
          hours: 0,
          minutes: 0,
          seconds: 0,
          milliseconds: 0
        };
      }

      let years = toDate.getFullYear() - fromDate.getFullYear();
      let yearAnchor = addYears(fromDate, years);

      if (yearAnchor > toDate) {
        years -= 1;
        yearAnchor = addYears(fromDate, years);
      }

      let months =
        (toDate.getFullYear() - yearAnchor.getFullYear()) * 12 +
        (toDate.getMonth() - yearAnchor.getMonth());
      let monthAnchor = addMonths(yearAnchor, months);

      if (monthAnchor > toDate) {
        months -= 1;
        monthAnchor = addMonths(yearAnchor, months);
      }

      let remaining = toDate.getTime() - monthAnchor.getTime();

      const days = Math.floor(remaining / MS_PER_DAY);
      remaining -= days * MS_PER_DAY;

      const hours = Math.floor(remaining / MS_PER_HOUR);
      remaining -= hours * MS_PER_HOUR;

      const minutes = Math.floor(remaining / MS_PER_MINUTE);
      remaining -= minutes * MS_PER_MINUTE;

      const seconds = Math.floor(remaining / MS_PER_SECOND);
      remaining -= seconds * MS_PER_SECOND;

      return {
        years,
        months,
        days,
        hours,
        minutes,
        seconds,
        milliseconds: remaining
      };
    }

    function formatAnnouncement(parts) {
      return (
        `Current age: ${parts.years} years, ${parts.months} months, ${parts.days} days, ` +
        `${parts.hours} hours, ${parts.minutes} minutes, and ${parts.seconds} seconds.`
      );
    }

    function render() {
      const now = new Date();
      const elapsed = getElapsedParts(START_DATE, now);

      partNodes.years.textContent = pad(elapsed.years, 2);
      partNodes.months.textContent = pad(elapsed.months, 2);
      partNodes.days.textContent = pad(elapsed.days, 2);
      partNodes.hours.textContent = pad(elapsed.hours, 2);
      partNodes.minutes.textContent = pad(elapsed.minutes, 2);
      partNodes.seconds.textContent = pad(elapsed.seconds, 2);
      partNodes.milliseconds.textContent = pad(elapsed.milliseconds, 3);

      const announcementKey = [
        elapsed.years,
        elapsed.months,
        elapsed.days,
        elapsed.hours,
        elapsed.minutes,
        elapsed.seconds
      ].join(":");

      if (announcementKey !== previousAnnouncementKey) {
        liveRegion.textContent = formatAnnouncement(elapsed);
        previousAnnouncementKey = announcementKey;
      }

      window.requestAnimationFrame(render);
    }

    if (Number.isNaN(START_DATE.getTime())) {
      const timer = document.getElementById("timer");
      timer.textContent = "Invalid start date.";
      liveRegion.textContent = "The timer could not start because the reference date is invalid.";
    } else {
      render();
    }
  </script>
</body>
</html>
