<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A minimal live age timer showing calendar-accurate elapsed time." />
  <title>Current Age Timer</title>
  <style>
    :root {
      --bg: #0b0b0b;
      --text: #f5f5f5;
      --muted: #8f8f8f;
      --font-stack: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-stack);
    }

    main {
      width: 100%;
      display: grid;
      place-items: center;
    }

    .timer-card {
      display: grid;
      gap: 8px;
      width: fit-content;
      max-width: 100%;
      font-variant-numeric: tabular-nums;
    }

    .timer-label {
      margin: 0;
      font-size: clamp(1rem, 2vw, 1.125rem);
      line-height: 1.4;
      font-weight: 600;
    }

    .timer-output {
      display: block;
      margin: 0;
      max-width: 100%;
      overflow-x: auto;
      white-space: nowrap;
      font-size: clamp(1rem, 2.4vw, 1.875rem);
      line-height: 1.35;
      letter-spacing: -0.02em;
      scrollbar-width: thin;
    }

    .value {
      font-weight: 700;
      color: var(--text);
    }

    .unit {
      font-size: 0.82em;
      color: var(--muted);
      font-weight: 500;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="timer-card" aria-labelledby="timer-label">
      <h1 id="timer-label" class="timer-label">Current age:</h1>
      <output id="timer" class="timer-output" role="timer" aria-hidden="true">
        <span class="value" data-part="years">00</span> <span class="unit">years</span>
        <span class="value" data-part="months">00</span> <span class="unit">months</span>
        <span class="value" data-part="days">00</span> <span class="unit">days</span>
        <span class="value" data-part="hours">00</span> <span class="unit">hours</span>
        <span class="value" data-part="minutes">00</span> <span class="unit">minutes</span>
        <span class="value" data-part="seconds">00</span> <span class="unit">seconds</span>
        <span class="value" data-part="milliseconds">000</span> <span class="unit">milliseconds</span>
      </output>
      <p id="timer-live" class="sr-only" aria-live="polite" aria-atomic="true">Current age timer loading.</p>
      <noscript>
        <p class="timer-label">Enable JavaScript to view the live timer.</p>
      </noscript>
    </section>
  </main>

  <script>
    const START_DATE = new Date("2007-07-24T00:00:00+08:00");
    const ZERO_PARTS = Object.freeze({
      years: 0,
      months: 0,
      days: 0,
      hours: 0,
      minutes: 0,
      seconds: 0,
      milliseconds: 0
    });

    const MS_PER_SECOND = 1000;
    const MS_PER_MINUTE = 60 * MS_PER_SECOND;
    const MS_PER_HOUR = 60 * MS_PER_MINUTE;
    const MS_PER_DAY = 24 * MS_PER_HOUR;

    const PART_ORDER = [
      ["years", 2],
      ["months", 2],
      ["days", 2],
      ["hours", 2],
      ["minutes", 2],
      ["seconds", 2],
      ["milliseconds", 3]
    ];

    const liveRegion = document.getElementById("timer-live");
    const timerOutput = document.getElementById("timer");
    const partNodes = Object.fromEntries(
      PART_ORDER.map(([name]) => [name, document.querySelector(`[data-part="${name}"]`)])
    );

    let previousAnnouncementKey = "";
    let animationFrameId = 0;

    function pad(value, length) {
      return String(value).padStart(length, "0");
    }

    function daysInUtcMonth(year, monthIndex) {
      return new Date(Date.UTC(year, monthIndex + 1, 0)).getUTCDate();
    }

    function addUtcMonths(baseDate, monthOffset) {
      const monthProbe = new Date(Date.UTC(
        baseDate.getUTCFullYear(),
        baseDate.getUTCMonth() + monthOffset,
        1,
        baseDate.getUTCHours(),
        baseDate.getUTCMinutes(),
        baseDate.getUTCSeconds(),
        baseDate.getUTCMilliseconds()
      ));

      const targetYear = monthProbe.getUTCFullYear();
      const targetMonth = monthProbe.getUTCMonth();
      const targetDay = Math.min(baseDate.getUTCDate(), daysInUtcMonth(targetYear, targetMonth));

      return new Date(Date.UTC(
        targetYear,
        targetMonth,
        targetDay,
        baseDate.getUTCHours(),
        baseDate.getUTCMinutes(),
        baseDate.getUTCSeconds(),
        baseDate.getUTCMilliseconds()
      ));
    }

    function addUtcYears(baseDate, yearOffset) {
      return addUtcMonths(baseDate, yearOffset * 12);
    }

    function getElapsedParts(fromDate, toDate) {
      if (toDate < fromDate) {
        return ZERO_PARTS;
      }

      let years = toDate.getUTCFullYear() - fromDate.getUTCFullYear();
      let yearAnchor = addUtcYears(fromDate, years);

      if (yearAnchor > toDate) {
        years -= 1;
        yearAnchor = addUtcYears(fromDate, years);
      }

      let months =
        (toDate.getUTCFullYear() - yearAnchor.getUTCFullYear()) * 12 +
        (toDate.getUTCMonth() - yearAnchor.getUTCMonth());
      let monthAnchor = addUtcMonths(yearAnchor, months);

      if (monthAnchor > toDate) {
        months -= 1;
        monthAnchor = addUtcMonths(yearAnchor, months);
      }

      let remaining = toDate.getTime() - monthAnchor.getTime();

      const days = Math.floor(remaining / MS_PER_DAY);
      remaining -= days * MS_PER_DAY;

      const hours = Math.floor(remaining / MS_PER_HOUR);
      remaining -= hours * MS_PER_HOUR;

      const minutes = Math.floor(remaining / MS_PER_MINUTE);
      remaining -= minutes * MS_PER_MINUTE;

      const seconds = Math.floor(remaining / MS_PER_SECOND);
      remaining -= seconds * MS_PER_SECOND;

      return {
        years,
        months,
        days,
        hours,
        minutes,
        seconds,
        milliseconds: remaining
      };
    }

    function formatAnnouncement(parts) {
      return `Current age: ${parts.years} years, ${parts.months} months, ${parts.days} days, ${parts.hours} hours, ${parts.minutes} minutes, and ${parts.seconds} seconds.`;
    }

    function render() {
      const elapsed = getElapsedParts(START_DATE, new Date());

      for (const [name, length] of PART_ORDER) {
        partNodes[name].textContent = pad(elapsed[name], length);
      }

      const announcementKey = [
        elapsed.years,
        elapsed.months,
        elapsed.days,
        elapsed.hours,
        elapsed.minutes,
        elapsed.seconds
      ].join(":");

      if (announcementKey !== previousAnnouncementKey) {
        liveRegion.textContent = formatAnnouncement(elapsed);
        previousAnnouncementKey = announcementKey;
      }

      animationFrameId = window.requestAnimationFrame(render);
    }

    function startTimer() {
      if (!Number.isNaN(START_DATE.getTime())) {
        render();
        return;
      }

      timerOutput.textContent = "Invalid start date.";
      liveRegion.textContent = "The timer could not start because the reference date is invalid.";
    }

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        window.cancelAnimationFrame(animationFrameId);
        return;
      }

      render();
    });

    startTimer();
  </script>
</body>
</html>
